<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원소 주기율표 스무고개</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="theme-space"> <!-- 기본 테마: 우주 -->
    <script>
        // 전역 에러 핸들러 (버그 추적용)
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.body.innerHTML += '<div style="color:red; background:white; padding:20px; z-index:9999; position:absolute; top:0; left:0; width:100%;">사소한 에러 발생: ' + msg + ' (줄: ' + lineNo + ')</div>';
        };
    </script>
    <div id="app" class="app-container">
        <h2 style="text-align:center; margin-top:50px;">로딩 중... (화면이 멈춘 경우 JS 에러를 확인하세요)</h2>
    </div>
    
    <!-- Main JS Application -->
    <script src="hints.js"></script>
    <script src="app.js"></script>
</body>
</html>
