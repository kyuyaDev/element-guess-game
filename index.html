<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원소 주기율표 스무고개</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="theme-space"> <!-- 기본 테마: 우주 -->
    <script>
        // 전역 에러 핸들러 (버그 추적용)
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.body.innerHTML += '<div style="color:red; background:white; padding:20px; z-index:9999; position:absolute; top:0; left:0; width:100%;">사소한 에러 발생: ' + msg + ' (줄: ' + lineNo + ')</div>';
        };
    </script>
    <div id="app" class="app-container">
        <h2 style="text-align:center; margin-top:50px;">로딩 중... (화면이 멈춘 경우 JS 에러를 확인하세요)</h2>
    </div>

    <!-- Top HUD -->
    <div class="top-hud">
        <button id="helpBtn" class="icon-btn" onclick="toggleHelp()">❓</button>
        <button id="soundBtn" class="icon-btn" onclick="toggleSoundUI()">🔇</button>
    </div>

    <!-- Help Modal -->
    <div id="helpModal" class="modal-overlay" style="display: none;">
        <div class="modal-content fade-in">
            <h2>📜 게임 가이드</h2>
            <p><strong>🔹 기본 룰:</strong> 주어진 힌트를 보고 118개의 원소 중 진짜 원소를 맞히는 게임입니다. (총 30문제)</p>
            <p><strong>🔹 힌트:</strong> [다음 힌트 💡]를 누르면 새로운 힌트가 열리지만, 더 많은 힌트를 볼수록 맞혔을 때 얻는 점수는 줄어듭니다.</p>
            <p><strong>🔹 제한 시간:</strong> 문제당 <strong>1분</strong>의 제한 시간이 있습니다. 타이머가 0이 되면 0점 처리되고 다음 문제로 넘어갑니다.</p>
            <p><strong>🔹 기회:</strong> 매 문제마다 3번의 하트(기회)가 주어집니다.</p>
            <button class="btn btn-secondary" onclick="toggleHelp()">알겠습니다!</button>
        </div>
    </div>
    
    <!-- Main JS Application -->
    <script src="audio.js"></script>
    <script src="hints.js"></script>
    <script src="app.js"></script>
</body>
</html>
